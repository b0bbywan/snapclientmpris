# Example snapcastmpris configuration.
#
# Copy this file to one of the following locations to make it take effect
# (paths are tried in order, first match wins):
#
#   $XDG_CONFIG_HOME/snapcastmpris/snapcastmpris.conf
#   ~/.config/snapcastmpris/snapcastmpris.conf
#   /etc/snapcastmpris.conf
#
# If no file is found, snapcastmpris falls back to the built-in defaults.

# Snapcast server IP. Leave commented to use Zeroconf auto-discovery.
# server = 192.168.1.100

# D-Bus bus type to publish the MPRIS2 interface on.
#   system  : legacy hifiberry behaviour (default), used with the
#             shipped system unit
#   session : recommended for a systemd --user deployment
dbus-bus = system

# ALSA mixer used for volume synchronisation (default: Softvol)
# alsa-mixer = Softvol

# Mirror MPRIS volume changes to the ALSA mixer (1 = enabled)
# sync-alsa-volume = 0

# Auto-start snapclient when a stream is detected (default: 1)
# autostart = 1
