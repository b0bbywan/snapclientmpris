<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!--
    snapclientmpris.service runs as the _snapclient system user on Debian
    (matching snapclient.service from the snapclient package). Grant it
    the right to own the MPRIS2 bus name on the system bus.
  -->
  <policy user="_snapclient">
    <allow own="org.mpris.MediaPlayer2.snapcast"/>
  </policy>

  <!--
    Any local user may talk to the MPRIS interface so that desktop media
    keys, playerctl, MPRIS controllers, etc. can pause/resume/read
    metadata.
  -->
  <policy context="default">
    <allow send_destination="org.mpris.MediaPlayer2.snapcast"/>
    <allow receive_sender="org.mpris.MediaPlayer2.snapcast"/>
  </policy>
</busconfig>
