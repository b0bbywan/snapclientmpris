# Example snapclientmpris configuration.
#
# Copy this file to one of the following locations to make it take effect
# (paths are tried in order, first match wins):
#
#   $XDG_CONFIG_HOME/snapclientmpris/snapclientmpris.conf
#   ~/.config/snapclientmpris/snapclientmpris.conf
#   /etc/snapclientmpris.conf
#
# If no file is found, snapclientmpris falls back to the built-in defaults.

# Snapcast server IP. Leave commented to use Zeroconf auto-discovery.
# server = 192.168.1.100
# Override the JSON-RPC control port. Almost never needed: snapserver
# defaults to 1705, and snapserver >= 0.33 advertises the actual port via
# _snapcast-ctrl._tcp. Only useful if you've changed snapserver's TCP
# control port AND you run snapserver < 0.33 (e.g. 0.31 in Debian trixie).
# control-port = 1705

# D-Bus bus type to publish the MPRIS2 interface on.
#   session : per-user deployment (default), used with the shipped user
#             systemd unit
#   system  : system deployment, used with the shipped system unit.
dbus-bus = session
