name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3

  deb:
    runs-on: ubuntu-latest
    # Build inside the same Debian release we target (trixie) so dh-python,
    # debhelper and python3-* versions match what users actually have.
    container:
      image: debian:trixie
    steps:
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates git \
            build-essential debhelper dh-python \
            python3 python3-setuptools devscripts

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync changelog with tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DEBFULLNAME: GitHub Actions
          DEBEMAIL: actions@github.com
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Map pre-release suffixes to a Debian-sortable form: -rcN/-betaN/-alphaN
          # would sort ABOVE the final version (treated as a Debian revision),
          # so rewrite them to ~rcN/~betaN/~alphaN which sort below.
          TAG="$(echo "$TAG" | sed -E 's/-(rc|beta|alpha)/~\1/')"
          CL="$(dpkg-parsechangelog -S Version)"
          if [ "$TAG" != "$CL" ]; then
            # -b: allow the new version to sort below the current one, which
            # happens when tagging a prerelease (e.g. CL=1.0.1, TAG=1.0.1~rc.1)
            dch -b --newversion "$TAG" --distribution unstable --urgency medium \
              "Release $TAG"
          fi

      - name: Build .deb
        run: dpkg-buildpackage -b -us -uc

      - name: Collect .deb
        run: |
          mkdir -p dist
          mv ../snapclientmpris_*.deb dist/
          ls -lh dist/

      - uses: actions/upload-artifact@v6
        with:
          name: snapclientmpris-deb
          path: dist/*.deb
          if-no-files-found: error

  release:
    needs: deb
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: snapclientmpris-deb
          path: dist/
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*.deb
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  notify-apt-repo:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.APT_REPO_TOKEN }}
          repository: b0bbywan/odio-apt-repo
          event-type: release-published
          client-payload: '{"repo": "${{ github.repository }}", "tag": "${{ github.ref_name }}"}'
